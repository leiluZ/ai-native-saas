repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        name: ruff (backend)
        args: ["--fix"]
        files: ^ai-saas-week\d+/app/backend/src/

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: black (backend)
        files: ^ai-saas-week\d+/app/backend/src/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier (all)
        files: ^ai-saas-week\d+/.*\.(ts|tsx|js|jsx|json|md|yml|yaml|css|scss|html)$

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: yamllint
        args: ["-d", "relaxed"]
        files: ^ai-saas-week\d+/.*\.(yml|yaml)$

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: bash scripts/run-eslint.sh
        language: system
        pass_filenames: false
        files: ^ai-saas-week\d+/app/web/src/
        stages: [pre-commit]

      - id: api-typecheck-build
        name: api typecheck/build
        entry: bash -c "cd ai-saas-week1/app/api && npm run build"
        language: system
        pass_filenames: false
        files: ^ai-saas-week\d+/app/api/|^ai-saas-week\d+/packages/shared/
        stages: [pre-push]

      - id: web-typecheck-build
        name: web typecheck/build
        entry: bash -c "cd ai-saas-week1/app/web && npm run build"
        language: system
        pass_filenames: false
        files: ^ai-saas-week\d+/app/web/|^ai-saas-week\d+/packages/shared/
        stages: [pre-push]

      - id: shared-build
        name: shared build
        entry: bash -c "cd ai-saas-week1/packages/shared && npm run build"
        language: system
        pass_filenames: false
        files: ^ai-saas-week\d+/packages/shared/
        stages: [pre-push]

      - id: local-ci-test
        name: local CI/CD test
        entry: bash scripts/run-ci-local.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
