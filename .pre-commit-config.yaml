repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        name: ruff week1
        args: ["--fix"]
        files: ^ai-saas-week1/app/backend/src/
      - id: ruff
        name: ruff week2
        args: ["--fix"]
        files: ^ai-saas-week2/app/backend/src/

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: black week1
        files: ^ai-saas-week1/app/backend/src/
      - id: black
        name: black week2
        files: ^ai-saas-week2/app/backend/src/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier week1
        files: ^ai-saas-week1/.*\.(ts|tsx|js|jsx|json|md|yml|yaml|css|scss|html)$
      - id: prettier
        name: prettier week2
        files: ^ai-saas-week2/.*\.(ts|tsx|js|jsx|json|md|yml|yaml|css|scss|html)$

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: yamllint week1
        args: ["-d", "relaxed"]
        files: ^ai-saas-week1/.*\.(yml|yaml)$
      - id: yamllint
        name: yamllint week2
        args: ["-d", "relaxed"]
        files: ^ai-saas-week2/.*\.(yml|yaml)$

  - repo: local
    hooks:
      - id: api-typecheck-build
        name: api typecheck/build
        entry: bash -c "cd ai-saas-week1/app/api && npm run build"
        language: system
        pass_filenames: false
        files: ^ai-saas-week1/app/api/|^ai-saas-week1/packages/shared/
        stages: [pre-push]

      - id: web-typecheck-build
        name: web typecheck/build
        entry: bash -c "cd ai-saas-week1/app/web && npm run build"
        language: system
        pass_filenames: false
        files: ^ai-saas-week1/app/web/|^ai-saas-week1/packages/shared/
        stages: [pre-push]

      - id: shared-build
        name: shared build
        entry: bash -c "cd ai-saas-week1/packages/shared && npm run build"
        language: system
        pass_filenames: false
        files: ^ai-saas-week1/packages/shared/
        stages: [pre-push]
