name: CI Pipeline (Week3)

on:
  push:
    branches: [main, develop, week*-*]
    paths:
      - 'ai-saas-week3/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ai-saas-week3/**'
      - '.github/workflows/ci.yml'

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint Code (Week3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Run ruff lint for week3
        run: |
          if [ -d "ai-saas-week3/app/backend/src/" ]; then
            ruff check ai-saas-week3/app/backend/src/
          fi

      - name: Check black formatting for week3
        run: |
          if [ -d "ai-saas-week3/app/backend/src/" ]; then
            black --check ai-saas-week3/app/backend/src/
          fi

      - name: Check YAML files for week3
        run: |
          pip install yamllint
          if [ -f "ai-saas-week3/docker-compose.yml" ]; then
            yamllint -d relaxed ai-saas-week3/docker-compose.yml
          fi

  backend-tests-week3:
    name: Backend Tests (Week3)
    runs-on: ubuntu-latest
    needs: lint
    if: always() && needs.lint.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock pytest-cov
          if [ -f "ai-saas-week3/app/backend/requirements.txt" ]; then
            pip install -r ai-saas-week3/app/backend/requirements.txt
          fi

      - name: Run backend tests for week3
        run: |
          if [ -d "ai-saas-week3/app/backend/tests/" ]; then
            cd ai-saas-week3/app/backend
            PYTHONPATH=. pytest tests/ \
                   -v --cov=src/ --cov-report=xml
          fi

      - name: Upload coverage for week3
        uses: codecov/codecov-action@v4
        with:
          files: ai-saas-week3/app/backend/coverage.xml
          flags: backend-week3

  docker-build-week3:
    name: Docker Build (Week3)
    runs-on: ubuntu-latest
    needs: backend-tests-week3
    if: github.event_name == 'push' && always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build week3 backend image
        uses: docker/build-push-action@v5
        with:
          context: ai-saas-week3/app/backend
          push: false
          tags: ai-saas-backend-week3:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
