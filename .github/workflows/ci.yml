name: CI Pipeline (Week3)

on:
  push:
    branches: [main, develop, week*-*]
    paths:
      - 'ai-saas-week3/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ai-saas-week3/**'
      - '.github/workflows/ci.yml'

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint Code (Week3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Run ruff lint for week3
        run: |
          if [ -d "ai-saas-week3/app/backend/src/" ]; then
            ruff check ai-saas-week3/app/backend/src/
          fi

      - name: Check black formatting for week3
        run: |
          if [ -d "ai-saas-week3/app/backend/src/" ]; then
            black --check ai-saas-week3/app/backend/src/
          fi

      - name: Check YAML files for week3
        run: |
          pip install yamllint
          if [ -f "ai-saas-week3/docker-compose.yml" ]; then
            yamllint -d relaxed ai-saas-week3/docker-compose.yml
          fi

  backend-tests-week3:
    name: Backend Tests (Week3)
    runs-on: ubuntu-latest
    needs: lint
    if: always() && needs.lint.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock pytest-cov
          if [ -f "ai-saas-week3/app/backend/requirements.txt" ]; then
            pip install -r ai-saas-week3/app/backend/requirements.txt
          fi

      - name: Run backend tests for week3
        run: |
          if [ -d "ai-saas-week3/app/backend/tests/" ]; then
            cd ai-saas-week3/app/backend
            PYTHONPATH=. pytest tests/ --ignore=tests/fixtures -v
          fi

      - name: Run document parser test
        run: |
          if [ -f "ai-saas-week3/app/backend/scripts/test_document_parser.py" ]; then
            cd ai-saas-week3/app/backend
            PYTHONPATH=. python scripts/test_document_parser.py
          fi

  frontend-lint-week3:
    name: Frontend Lint (Week3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ai-saas-week3/app/web/package-lock.json'

      - name: Install frontend dependencies
        run: |
          cd ai-saas-week3/app/web
          npm ci

      - name: Run ESLint
        run: |
          cd ai-saas-week3/app/web
          npm run lint

  frontend-build-week3:
    name: Frontend Build (Week3)
    runs-on: ubuntu-latest
    needs: frontend-lint-week3
    if: always() && needs.frontend-lint-week3.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ai-saas-week3/app/web/package-lock.json'

      - name: Install frontend dependencies
        run: |
          cd ai-saas-week3/app/web
          npm ci

      - name: Build frontend
        run: |
          cd ai-saas-week3/app/web
          npm run build

  frontend-e2e-week3:
    name: Frontend E2E Tests (Week3)
    runs-on: ubuntu-latest
    needs: frontend-build-week3
    if: always() && needs.frontend-build-week3.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ai-saas-week3/app/web/package-lock.json'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-saas-week3/app/backend/requirements.txt -q

      - name: Install frontend dependencies
        run: |
          cd ai-saas-week3/app/web
          npm ci

      - name: Install Playwright
        run: |
          cd ai-saas-week3/app/web
          npx playwright install --with-deps

      - name: Start backend service
        run: |
          cd ai-saas-week3/app/backend
          PYTHONPATH=. uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/api/v1/health/ > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            sleep 1
          done

      - name: Run E2E tests
        run: |
          cd ai-saas-week3/app/web
          npm run test:e2e

      - name: Stop backend service
        if: always()
        run: |
          pkill -f "uvicorn src.main:app" || true

  docker-build-week3:
    name: Docker Build (Week3)
    runs-on: ubuntu-latest
    needs: [backend-tests-week3, frontend-build-week3]
    if: github.event_name == 'push' && always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build week3 backend image
        uses: docker/build-push-action@v5
        with:
          context: ai-saas-week3/app/backend
          push: false
          tags: ai-saas-backend-week3:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
