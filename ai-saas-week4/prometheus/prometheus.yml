global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ai-saas-week4

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:8080
        labels:
          service: gateway

  - job_name: node_exporter
    static_configs:
      - targets:
          - node_exporter:9100
        labels:
          service: node
