version: "3.8"

services:
  vllm:
    image: vllm/vllm-openai:v0.21.0-ubuntu2404
    container_name: vllm-benchmark
    ports:
      - "8000:8000"
    volumes:
      - vllm-model:/root/.cache/huggingface
      - ./models:/models
    environment:
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_MODEL=/root/.cache/huggingface/models/Qwen/Qwen2.5-7B-Instruct
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: --model /root/.cache/huggingface/models/Qwen/Qwen2.5-7B-Instruct --host 0.0.0.0 --port 8000

  vllm-quantized:
    image: vllm/vllm-openai:v0.21.0-ubuntu2404
    container_name: vllm-quantized
    ports:
      - "8001:8000"
    volumes:
      - vllm-model:/root/.cache/huggingface
      - ./models:/models
    environment:
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: --model /models/quantized/awq --quantization awq --host 0.0.0.0 --port 8000

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-benchmark
    ports:
      - "11434:11434"
    volumes:
      - ollama-model:/root/.ollama/models
    environment:
      - OLLAMA_MODEL=qwen2.5:7b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_API_KEY=sk-gateway-default-key
      - RATE_LIMIT_PER_MINUTE=60
      - GLOBAL_TIMEOUT=120.0
      - MAX_RETRIES=3
      - HEALTH_CHECK_INTERVAL=30
      - HEARTBEAT_INTERVAL=15.0
    depends_on:
      - vllm
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  vllm-model:
  ollama-model:
