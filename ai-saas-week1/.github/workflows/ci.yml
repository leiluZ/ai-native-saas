name: CI Pipeline

on:
  push:
    branches: [main, develop, week1-*]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Install frontend dependencies
        run: |
          cd ai-saas-week1/app/web
          npm ci

      - name: Run ruff lint
        run: |
          ruff check ai-saas-week1/app/backend/src/

      - name: Check black formatting
        run: |
          black --check ai-saas-week1/app/backend/src/

      - name: Check YAML files
        run: |
          python -m pip install yamllint
          yamllint -d relaxed ai-saas-week1/docker-compose.yml

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock pytest-cov
          pip install -r ai-saas-week1/app/backend/requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: ai-saas-week1/app/backend
        run: |
          cd ai-saas-week1/app/backend
          pytest tests/test_llm_client.py \
                 tests/test_tool_registry.py \
                 tests/test_memory_manager.py \
                 tests/test_agent_router.py \
                 -v --cov=src/agents/ --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ai-saas-week1/app/backend/coverage.xml
          flags: backend

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd ai-saas-week1/app/web
          npm ci

      - name: Run frontend tests
        run: |
          cd ai-saas-week1/app/web
          npm test -- --coverage --watchAll=false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        env:
          DOCKER_BUILDKIT: 1

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ai-saas-week1/app/backend
          push: false
          tags: ai-saas-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: ai-saas-week1
          file: ai-saas-week1/infra/Dockerfile.web
          push: false
          tags: ai-saas-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Compose up
        run: |
          cd ai-saas-week1
          docker-compose up -d
          sleep 30
          docker-compose ps

      - name: Check services health
        run: |
          cd ai-saas-week1
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:3000 || exit 1

      - name: Cleanup
        if: always()
        run: |
          cd ai-saas-week1
          docker-compose down -v
